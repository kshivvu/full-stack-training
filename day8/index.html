<!DOCTYPE html>
<html>

<head>
    <title>Weather Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        .spinner {
            font-size: 20px;
        }
    </style>

</head>

<body>

    <h2>Weather Dashboard</h2>

    <div id="loading" class="spinner">Loading weather...</div>

    <div class="container" id="weather"></div>

    <script src="script.js"></script>

</body>

</html>
